[profile.default]
src = "src"
out = "out"
libs = ["node_modules"]
via_ir = true
optimizer = true
optimizer_runs = 200

[rpc_endpoints]
# publicnode.com serves archive state for the Bybit-era block (21,895,238) and
# does not 408 on storage queries against empty addresses — which the
# TrapDeployConfig.BASELINE_FEEDER overlay needs during fork tests.
mainnet = "https://ethereum-rpc.publicnode.com"
